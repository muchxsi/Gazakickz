<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | Gazakickz</title>

    <!-- link the bootstrap files -->
     <link rel="stylesheet" href="css/bootstrap.css">
     <script src="js/bootstrap.js"></script>
</head>
<body class="bg-dark">
    

    <!-- Signup page -->
     <!-- name of the company -->
      <section class="row justify-content-center">
        <!-- we shall use two columns -->
         <div class="col-md-6">
            <!-- name of our company,image -->
             <div class="text-center m-5 text-white">
                <h2>Gazakickz</h2>
                <p>Welcome to <i>Gazakickz</i></p>
                <div>
                    <img src="official shoe wear images/download (1).jpg" alt="Gazakickz Group Photo" height="400px" width="100%" class="img-fluid mt-3" style="width: 260px; border-radius: 200px;">
                </div>
             </div>
         </div>
         <div class="col-md-6 p-3">
            <!-- signup section -->
             <div class="m-3">
                <!-- card-contains our signup input fields -->
                 <!-- username, password, email, telephone -->
                  <div class="card shadow">
                    <div class="card-header text-center text-white bg-success">
                        <h4>Create Account</h4>
                    </div>
                    <!-- card-body -->
                     <div class="card-body">
                        <!-- form to carry the input fields -->
                         <form>
                            <div class="mb-3">
                                <Label>Full Name</Label> <br>
                                <input type="text" placeholder="Enter Full Name" class="form form-control">
                            </div>
                            <div class="mb-3">
                                <label for="Email">Email</label> <br>
                                <input type="email" placeholder="Enter Your Email Address" class="form form-control">
                            </div>
                            <div class="mb-3">
                                <label for="">Password</label> <br>
                                <input type="password" placeholder="Enter Your Password" class="form form-control">
                            </div>
                            <div class="mb-3">
                                <label for="">Telephone</label> <br>
                                <input type="tel" placeholder="Enter Your Telephone number" class="form form-control">
                            </div>
                            <div class="mb-3">
                                <label for="">Confirm Password</label> <br>
                                <input type="password" placeholder="Confirm Your Password" class="form form-control">
                            </div>
                            <!-- button -->
                             <div class="d-grid">
                                <button class="btn btn-success">Register</button>
                             </div>
                         </form>
                         <p class="text-center mt-3">
                            Already have an account? <a href="signin.html">Sign In</a>
                         </p>

                         <a href="index.html" class="text-end">Back Home</a>
                     </div>
                  </div>
             </div>
         </div>
      </section>
</body>
</html>
