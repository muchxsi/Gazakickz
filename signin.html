<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gazakickz</title>

    <!-- link the bootstrap files -->
     <link rel="stylesheet" href="css/bootstrap.css">
     <script src="js/bootstrap.js"></script>
</head>
<body class="bg-dark">
    
    <section class="row">
        <div class="col-6 offset-3">
            <!-- card -->
             <div class="text-center m-5">
                <div class="card">
                    <div class="card-headerr">
                        <h4>Sign In</h4>
                    </div>
                    <div class="card-body">
                        <!-- user to enter email or phone and password to login -->
                        <form>
                         <div class="mb-3">
                            <input type="text" placeholder="enter email or phone" class="form-control">
                         </div>
                         <div class="mb-3">
                            <input type="password" placeholder="enter password" class="form-control">
                         </div>
                         <button class="btn btn-primary w-100">Log In</button>
                        </form>

                        <p class="text-center mt-3">
                            <a href="" class="">Forgot Password?</a>
                        </p>

                        <a href="signup.html">
                            <span class="btn btn-outline-primary w-100">Create new account</span>
                        </a>

                        
                    </div>
                </div>
             </div>
        </div>
    </section>
</body>
</html>
